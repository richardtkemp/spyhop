<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>spyhop · a living ocean</title>
<style>
  :root { --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #05070f; }
  #pond { position: fixed; inset: 0; display: block; }
  .hud { position: fixed; inset: 0; pointer-events: none; z-index: 3; font-family: var(--mono); }
  .title { position: absolute; left: 22px; top: 18px; }
  .title h1 { margin: 0; font-size: 16px; font-weight: 500; letter-spacing: .3em; color: #bfe0e4; text-shadow: 0 0 18px rgba(90,190,190,.4); }
  .title p { margin: 6px 1px 0; font-size: 11px; letter-spacing: .05em; color: #5a7580; display: flex; align-items: center; gap: 7px; }
  .live { width: 7px; height: 7px; border-radius: 50%; background: #46d69a; box-shadow: 0 0 8px #46d69a; transition: background .3s, box-shadow .3s; }
  .live.stale { background: #d6a24a; box-shadow: 0 0 8px #d6a24a; }
  .live.down { background: #d65a5a; box-shadow: 0 0 8px #d65a5a; }
  .legend { position: absolute; left: 22px; bottom: 16px; font-size: 10.5px; letter-spacing: .04em; color: #567079; line-height: 1.9; }
  .legend b { color: #8fb8bd; font-weight: 500; }
  .stats { position: absolute; right: 22px; top: 18px; text-align: right; font-size: 10.5px; letter-spacing: .05em; color: #5a7580; line-height: 1.85; }
  .stats b { color: #9fc6c0; font-weight: 500; }
  .toggle { position: absolute; right: 22px; bottom: 16px; pointer-events: auto; }
  .toggle button { font-family: var(--mono); font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase; color: #6a848c; background: rgba(14,26,32,.5); border: 1px solid rgba(110,160,165,.18); padding: 7px 12px; border-radius: 999px; cursor: pointer; backdrop-filter: blur(6px); }
  .toggle button:hover { color: #bfe0e4; border-color: rgba(120,220,210,.4); }
</style>
</head>
<body>
<canvas id="pond"></canvas>
<div class="hud">
  <div class="title"><h1 id="host">spyhop</h1><p><span class="live" id="live"></span><span id="conn">connecting…</span></p></div>
  <div class="stats" id="stats"></div>
  <div class="legend">
    <div><b>sky</b> = 5-min load — clouds, wind &amp; waves build with it</div>
    <div><b>lightning</b> = swap &gt; 90% &nbsp;·&nbsp; <b>rain</b> = active alert</div>
    <div><b>creatures</b> = processes · size = memory · speed = cpu</div>
  </div>
  <div class="toggle"><button id="lbl">labels: on</button></div>
</div>

<script>
"use strict";
(() => {
  /* ======================= tunables ======================= */
  const CFG = {
    pollMs: 4000, keepAliveMs: 60000,
    arriveSec: 1.5, leaveSec: 5.1,                             // swim-away is slow (~3x the arrival)
    far: { scale: 0.12, turn: 0.18, yscale: 0.28, alpha: 0.12 },// receding also flattens on Y
    ease: { r: 0.06, cpu: 0.05, cpuSlow: 0.012, storm: 0.12, avoidDecay: 0.86, temp: 0.05 },   // cpu: wiggle (momentary) · cpuSlow: speed (~3s integral)
    speed: { floor: 8, ceil: 95, cpuRef: 90 },
    edge: { zone: 90, boost: 2.4 },                            // speed up near the screen edges so nobody loiters
    wiggle: { base: 4, cpu: 7, sizeRef: 24, sizeMin: 0.4 },       // sizeRef/sizeMin: bigger creatures beat fins slower
    bob: { fish: 16, school: 14, cpuBoost: 0.7, jellyDrift: 12, jellyRate: 0.35, jellySlow: 0.22 },   // jellyRate: bell/tentacle pulse rate; jellySlow: the (much slower, decoupled) vertical drift
    whale: { flipperK: 70 },                                    // flipper phase rate = flipperK * (1 + act) / rDraw — big whales flap lazily (~4s/beat near max size), small ones twitch faster
    radius: { base: 6, memK: 0.85, max: 58, schoolFish: 0.9 },
    shoal: { sepK: 1.8, neighK: 2.1, sepForce: 650, align: 0.55, cohesion: 0.35, home: 0.1, maxSpd: 46, minSpd: 8, wander: 18, rangeK: 2.6 },   // boids tuning for school members — sepK/neighK scale with each member's actual drawn size
    avoid: { gap: 0.72, push: 90, yBias: 1.0, slide: 1.8 },    // slide: strong tangential unstick so head-on pairs pass
    crab: { near: 1.7, boost: 2.8, decay: 0.9, crawl: 1, dirLock: 0.6 },   // near crabs: the larger scoots away; dirLock: min s before it may flip again
    label: { push: 0.45, crabPush: 1.0, charW: 6.4, decay: 0.82 },
    tempWindowMs: 15000,                                       // mean cpu-temp window for the thermal glow
    waterLevelF: 0.30, bedFrac: 0.90, wxMax: 1.6,
    weather: {
      floor: 0.18,                                              // load/core below this reads as calm
      cloudBase: 3, cloudGain: 12, poolMax: 22, fade: 0.03,
      sizeBase: 1.0, sizeGain: 1.2,
      windBase: 4, windGain: 95,
      waveBase: 1.2, waveGain: 16,
      whitecapWi: 0.45,
    },
    swap: { boltFloor: 90 },                                    // lightning begins above this swap %
    disk: { knee: 80, base: 2, max: 26, exp: 1.8 },             // seabed rocks; superlinear past the knee
    temp: { lo: 50, hi: 92, dayLo: 66, dayHi: 90 },             // lo/hi: thermal underglow; dayLo/dayHi: sun horizon->zenith
    sun: { tau: 1.8 },                                          // smoothing time-constant for the sun's rise/fall (gentler = larger)
    moon: { xF: 0.82, yF: 0.12, rF: 0.05 }, storm: { xF: 0.76, yF: 0.10 },
  };
  const PAL = {
    skyTop: '#070a1a', skyMid: '#0b1428', skyLow: '#132a38',
    waterTop: '#123244', waterMid: '#0c2534', waterLow: '#061620',
    bedFill: '#08252a', bedLow: '#05171b',
    moonCore: '#e7efe6', moonCrater: 'rgba(120,140,140,0.18)', moonGlow: a => `rgba(180,205,200,${a})`,
    cloud: a => `rgba(64,74,104,${a})`,
    storm: a => `rgba(74,52,104,${a})`, stormIn: a => `rgba(110,80,150,${a})`,
    stormCrit: a => `rgba(96,42,78,${a})`, stormCritIn: a => `rgba(132,60,100,${a})`,
    rain: a => `rgba(205,196,240,${a})`, flash: a => `rgba(215,198,245,${a})`,
    lightning: a => `rgba(226,232,255,${a})`, bolt: a => `rgba(246,249,255,${a})`,
    wind: a => `rgba(190,205,225,${a})`, star: a => `rgba(200,220,225,${a})`,
    god: a => `rgba(120,200,200,${a})`, plankton: a => `rgba(140,210,200,${a})`, thermal: a => `rgba(255,110,45,${a})`,
    bubble: a => `rgba(160,225,220,${a})`, surface: a => `rgba(150,220,220,${a})`, whitecap: a => `rgba(190,235,235,${a})`,
    alertWarn: a => `rgba(200,182,236,${a})`, alertCrit: a => `rgba(242,152,152,${a})`,
    label: h => h ? 'rgba(210,240,238,0.95)' : 'rgba(150,195,195,0.42)',
    eyeWhite: 'rgba(255,255,255,0.9)', eyeDark: '#04141a',
  };
  // Creature rules come from the server at /config.json (user pins + built-in
  // defaults, one source of truth). They're compiled into KINDS on boot; until
  // then KINDS is empty and kindOf() falls back to a per-name colour hash, so
  // the scene renders regardless.
  let KINDS = [];
  const SHAPES = new Set(['angler', 'whale', 'jelly', 'squid', 'ray', 'fish', 'school', 'crab']);
  const hashHue = s => { let h = 0; for (const ch of s) h = (h * 31 + ch.charCodeAt(0)) % 360; return h; };
  function specToKind(c) {
    const h = hashHue((c.match || '').toLowerCase());
    return {
      re: new RegExp(c.match, 'i'),                       // throws on bad pattern -> entry dropped
      shape: SHAPES.has(c.shape) ? c.shape : 'fish',
      hue: c.hue ?? (h + 180) % 360,
      sat: c.sat ?? 50, lit: c.lit ?? 58,
      spd: c.spd ?? (0.5 + (h % 30) / 60),
      band: Array.isArray(c.band) ? c.band : [.40, .78],
      mul: c.mul, always: c.always, detail: normDetail(c.detail),
    };
  }
  // Body detail level. Per-creature `detail` wins; else the global default (server render
  // .creatureDetail, or 'complex'); a ?detail= URL param force-overrides every creature (this client).
  const normDetail = v => (v === 'simple' || v === 'complex') ? v : null;
  const detailOf = k => DETAIL_FORCE ?? k.detail ?? DETAIL_DEFAULT;
  async function loadConfig() {
    try {
      const r = await fetch('/config.json', { cache: 'no-store' });
      if (!r.ok) throw 0;
      const cfg = await r.json();
      KINDS = (cfg.creatures || []).map(c => { try { return specToKind(c); } catch { return null; } }).filter(Boolean);
      applyRender(cfg.render);
    } catch (e) { applyRender(null); /* config unreachable -> defaults + any URL overrides */ }
  }
  function kindOf(name) {
    const s = name.toLowerCase();
    for (const k of KINDS) if (k.re.test(s)) return k;
    const h = hashHue(s);
    return { shape: 'fish', hue: (h + 180) % 360, sat: 42, lit: 58, spd: 0.5 + (h % 30) / 60, band: [.40, .78] };
  }

  /* ======================= helpers ======================= */
  const TAU = Math.PI * 2;
  const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
  const lerp = (a, b, t) => a + (b - a) * t;
  const easeOut = t => 1 - Math.pow(1 - t, 3);
  const rand = Math.random;
  const col = (k, dl, a) => `hsla(${k.hue},${k.sat}%,${clamp(k.lit + dl, 0, 100)}%,${a})`;
  const mixRGB = (a, b, t) => `${Math.round(lerp(a[0], b[0], t))},${Math.round(lerp(a[1], b[1], t))},${Math.round(lerp(a[2], b[2], t))}`;
  const mix = (a, b, t) => `rgb(${mixRGB(a, b, t)})`;
  const SKY_N = [[7, 10, 26], [11, 20, 40], [19, 42, 56]];       // night sky gradient stops
  const SKY_D = [[74, 128, 186], [120, 170, 214], [176, 208, 232]]; // day (blue) sky
  const CLOUD_N = [64, 74, 104], CLOUD_D = [206, 214, 226];     // cloud tint: night grey-blue -> day white
  const WATER_N = [[18, 50, 68], [12, 37, 52], [6, 22, 32]];    // water gradient: night deep -> sunlit teal
  const WATER_D = [[86, 168, 190], [46, 120, 150], [22, 78, 104]];
  const CLOUD_PUFFS = [[0, 0, 1], [.6, .1, .8], [-.6, .12, .75], [.25, -.2, .7], [-.25, -.15, .65]];

  const cv = document.getElementById('pond'); let ctx = cv.getContext('2d');   // `let` so sprite baking can redirect it into an offscreen canvas
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const M = reduce ? 0.2 : 1;
  // Wallpaper mode: ?mode=wallpaper (or ?fps=N) caps the frame rate to keep CPU
  // low when the scene runs behind the desktop all day. Default (no param) is
  // uncapped for normal browser viewing.
  const PARAMS = new URLSearchParams(location.search);
  const DEBUG = PARAMS.has('debug');
  const OFF = new Set((PARAMS.get('off') || '').split(',').filter(Boolean));               // ?off=sky,water,bed,bubbles,creatures,surface — disable draws to profile each
  const SHOT = +PARAMS.get('shot') || 0;                                                    // ?shot=N — run N seconds then freeze (one settled frame, for screenshots)
  const BENCH = PARAMS.has('bench');                                                         // ?bench — fixed synthetic workload (no polling) for reproducible benchmarks
  const DAYNIGHT = PARAMS.has('daynight');                                                   // ?daynight — slowly cycle temp (sun<->moon) for VISUAL testing; keep OFF for perf runs
  // Deterministic *all-elements* scene, so the render cost is identical run-to-run (real
  // telemetry drifts with load and masks deltas). Values are cranked so every subsystem is
  // exercised: high load5 -> full clouds + overcast + strong wind streaks; swap>90 -> lightning;
  // alarms + WARNING/CRITICAL alerts -> rain + alert text; high disk -> rocks; mid temp ->
  // twilight (stars + moon + sun + thermal glow); plus every creature shape below.
  const BENCH_STATE = {
    host: 'bench', uptime: '7d 0h', cpu: 78, load: 5.0, load5: 5.5, cores: 4,
    memPct: 82, swapPct: 95, temp: 62, tempMean: 62, disk: 85, alarms: 2,
    alerts: [{ n: 'cpu_pressure', s: 'WARNING', v: 88, u: '%' }, { n: 'disk_space', s: 'CRITICAL', v: 96, u: '%' }],
    containers: 9,
    roster: [
      { n: 'spyhop', m: 60, c: 1, cpu: 5 }, { n: 'qemu', m: 2048, c: 1, cpu: 40 },
      { n: 'netdata', m: 180, c: 1, cpu: 8 }, { n: 'opencode', m: 320, c: 1, cpu: 25 },
      { n: 'foci', m: 150, c: 1, cpu: 10 }, { n: 'firefox', m: 900, c: 1, cpu: 30 },
      { n: 'claude', m: 400, c: 4, cpu: 35 }, { n: 'kworker', m: 50, c: 8, cpu: 12 },
      { n: 'pihole', m: 120, c: 1, cpu: 6 }, { n: 'radarr', m: 200, c: 1, cpu: 15 },
      { n: 'sonarr', m: 210, c: 1, cpu: 12 }, { n: 'postgres', m: 300, c: 1, cpu: 20 },
      { n: 'python-worker', m: 250, c: 1, cpu: 18 }, { n: 'dockerd', m: 180, c: 1, cpu: 9 },
      { n: 'node-app', m: 280, c: 1, cpu: 22 }, { n: 'redis', m: 90, c: 1, cpu: 7 },
      { n: 'nginx', m: 70, c: 1, cpu: 5 }, { n: 'java-svc', m: 1200, c: 1, cpu: 28 },
    ],
  };
  // Render trade-offs: built-in defaults <- server /config.json render <- URL params (override, for benchmarking).
  let FPS_CAP = 30, FRAME_MIN = 0, DPR_CAP = 0, WIG_MODE = 'high', WIND_TIERS = 0, WIND_LEN = 44, WIND_A0 = 0, WIND_A1 = 1, SPRITE_PHASES = 0;   // WIG_MODE 'high' (animated) | 'none' (rigid)
  let DETAIL_DEFAULT = 'complex', DETAIL_FORCE = null;   // global default · ?detail= client override (forces all)
  function applyRender(cfg) {
    cfg = cfg || {};
    const pick = k => PARAMS.has(k) ? PARAMS.get(k) : cfg[k];
    FPS_CAP = Math.max(0, +(pick('fps') ?? 30) || 0);
    DPR_CAP = Math.max(0, +(pick('dpr') ?? 0) || 0);
    const w = pick('wiggle') ?? 'high';
    WIG_MODE = (w === false || w === 'false' || w === '0' || w === 0 || w === 'none') ? 'none' : 'high';
    WIND_TIERS = Math.max(0, Math.floor(+(pick('windTiers') ?? 0) || 0));
    WIND_LEN = Math.max(2, Math.floor(+(pick('windLength') ?? 44) || 44));
    WIND_A0 = Math.max(0, +(pick('windAlphaMin') ?? 0) || 0);
    WIND_A1 = Math.max(0, +(pick('windAlphaMax') ?? 1) || 0);
    SPRITE_PHASES = Math.max(0, Math.floor(+(pick('spritePhases') ?? 0) || 0));
    DETAIL_DEFAULT = normDetail(cfg.creatureDetail) ?? 'complex';
    DETAIL_FORCE = PARAMS.has('detail') ? normDetail(PARAMS.get('detail')) : null;
    FRAME_MIN = FPS_CAP ? (1 / FPS_CAP) - 0.002 : 0;
  }
  let W, H, DPR, waterY, bedY;
  let showLabels = true, firstLoad = true;
  const mouse = { x: -999, y: -999 };

  function ellipse(x, y, rx, ry) { ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, TAU); ctx.fill(); }
  function tri(ax, ay, bx, by, cx, cy) { ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(cx, cy); ctx.closePath(); ctx.fill(); }
  function dot(x, y, r, fill) { ctx.fillStyle = fill; ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill(); }
  function glow(r, k) { const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r); g.addColorStop(0, col(k, 12, .95)); g.addColorStop(.55, col(k, 0, .5)); g.addColorStop(1, col(k, -8, 0)); return g; }
  const radius = (mib, mul) => Math.min(CFG.radius.max, (CFG.radius.base + Math.sqrt(Math.max(1, mib)) * CFG.radius.memK) * (mul || 1));
  const schoolOffs = n => Array.from({ length: n }, () => ({ dx: (rand() - .5) * 60, dy: (rand() - .5) * 40, vx: 0, vy: 0, pref: .8 + rand() * .5, face: 1 }));

  // Boids: separation + alignment + cohesion, plus a gentle pull back toward the group's own
  // anchor point (so the shoal doesn't drift away from its label/position). O(n²) over the
  // school's own members only (n ≤ 8), never against other creatures — trivial per frame.
  // sep/neigh scale with the member's actual on-screen radius (bigger fish keep more distance)
  // and each member's own `pref` personality, so the spacing isn't a uniform crystal-grid.
  function updateBoids(off, dt, memberR) {
    const S = CFG.shoal, n = off.length;
    const sepBase = memberR * S.sepK, neighBase = memberR * S.neighK, range = neighBase * S.rangeK;
    for (let i = 0; i < n; i++) {
      const oi = off[i], sep = sepBase * oi.pref, neigh = neighBase * oi.pref;
      let sepX = 0, sepY = 0, alX = 0, alY = 0, cohX = 0, cohY = 0, near = 0;
      for (let j = 0; j < n; j++) {
        if (i === j) continue;
        const oj = off[j], dx = oi.dx - oj.dx, dy = oi.dy - oj.dy, d = Math.hypot(dx, dy) || .001;
        if (d < sep) { const f = (sep - d) / sep; sepX += (dx / d) * f; sepY += (dy / d) * f; }
        if (d < neigh) { alX += oj.vx; alY += oj.vy; cohX += oj.dx; cohY += oj.dy; near++; }
      }
      let ax = sepX * S.sepForce - oi.dx * S.home + (rand() - .5) * S.wander;
      let ay = sepY * S.sepForce - oi.dy * S.home + (rand() - .5) * S.wander;
      if (near) { ax += (alX / near - oi.vx) * S.align + (cohX / near - oi.dx) * S.cohesion; ay += (alY / near - oi.vy) * S.align + (cohY / near - oi.dy) * S.cohesion; }
      oi.vx += ax * dt; oi.vy += ay * dt;
      const spd = Math.hypot(oi.vx, oi.vy) || .001, cl = clamp(spd, S.minSpd, S.maxSpd);
      oi.vx = oi.vx / spd * cl; oi.vy = oi.vy / spd * cl;
      if (Math.abs(oi.vx) > 4) oi.face = oi.vx > 0 ? 1 : -1;   // face actual direction of travel (hysteresis: only flip on a clear signal, so it doesn't flicker near zero)
      oi.dx = clamp(oi.dx + oi.vx * dt, -range, range);
      oi.dy = clamp(oi.dy + oi.vy * dt, -range, range);
    }
  }

  /* ======================= live state ======================= */
  const S = { cpu: 0, load: 0, load5: 0, cores: 4, memPct: 0, swapPct: 0, temp: 0, tempMean: 0, disk: 0, alarms: 0, alerts: [], containers: 0, uptime: '—' };
  const env = { wi: 0, cloudCount: CFG.weather.cloudBase, cloudSize: CFG.weather.sizeBase, wind: CFG.weather.windBase, waveAmp: CFG.weather.waveBase, stormA: 0, stormAT: 0, rockCount: CFG.disk.base, tempDisp: 0, sunH: 0, sunH1: 0 };
  let lightning = 0, bolt = null, tempHist = [], lastUpdate = 0, connState = 'connecting';
  // Spyhop: honouring the name, one whale periodically rises vertically to poke its head above the
  // surface. first fires shortly after load, then on a fixed period; retries sooner if no whale is up.
  const SPY = { first: 5, period: 180, retry: 20, dur: 7.5, peak: .4, tilt: .85, slow: .82, riseWig: 28, fallWig: 12 };   // peak at 40%: rise ~3s, slower fall ~4.5s, no hold
  let nextSpyhop = SPY.first;
  // Spyhop vertical profile 0→1→0 over the animation: smoothstep up, hold at the surface, smoothstep
  // down. Smoothstep has zero slope at its ends, so takeoff, the top, and the landing are all gentle
  // (no hard stop) — unlike a sine hump, which arrives at the surface still moving.
  const smoothstep = t => t * t * (3 - 2 * t);
  // Jelly propulsion stroke over one bell cycle: a quick contraction (~35%) that jets it up, then a
  // slow relaxation while it drifts back down — real jellyfish only power the up-stroke, not the down.
  const jellyPulse = u => { u -= Math.floor(u); return u < .35 ? smoothstep(u / .35) : 1 - smoothstep((u - .35) / .65); };
  // Smooth raised-cosine hump peaking at SPY.peak (rise faster, fall slower). No flat top: eases into
  // the peak, kisses the surface still moving, then eases back down — velocity is 0 only at the turnaround.
  function spyLift(u) {
    if (u <= 0 || u >= 1) return 0;
    const p = SPY.peak;
    return u < p ? .5 - .5 * Math.cos(Math.PI * u / p)
                 : .5 + .5 * Math.cos(Math.PI * (u - p) / (1 - p));
  }

  /* ======================= creatures ======================= */
  const creatures = new Map();
  function makeCreature(item, present) {
    const k = kindOf(item.n), [a, b] = k.band;
    const per = k.shape === 'school' ? item.m / Math.max(1, item.c) : item.m;
    const members = k.shape === 'school' ? clamp(item.c | 0, 2, 8) : 1;
    const c = {
      name: item.n, mem: item.m, count: item.c, k, frac: a + rand() * (b - a),
      r: 0, rT: radius(per, k.mul), cpu: 0, cpuSlow: 0, cpuT: item.cpu || 0, person: .85 + rand() * .3,
      dir: rand() < .5 ? -1 : 1, dirLock: 0, t: rand() * 100, bob: rand() * TAU,
      x: rand() * innerWidth, swimY: 0, avoidY: 0, rDraw: 0, turn: 1, turnY: 1, alpha: 1, act: 0, wig: 0, boost: 0,
      spy: 0, spyT: 0, spyRot: 0, spyWig: 0, spyLiftPrev: 0,
      labelOff: { x: 0, y: 0 }, labelHW: 0,
      arrive: present ? 1 : 0, state: present ? 'in' : 'entering', lastSeen: Date.now(),
      off: schoolOffs(members),
    };
    if (present) c.r = c.rT;
    return c;
  }
  function reconcile(list) {
    for (const item of list) {
      let c = creatures.get(item.n);
      if (c) {
        c.mem = item.m; c.count = item.c; c.cpuT = item.cpu || 0; c.lastSeen = Date.now();
        c.rT = radius(c.k.shape === 'school' ? item.m / Math.max(1, item.c) : item.m, c.k.mul);
        if (c.state === 'leaving') c.state = 'entering';
        if (c.k.shape === 'school') { const w = clamp(item.c | 0, 2, 8); while (c.off.length < w) c.off.push(schoolOffs(1)[0]); c.off.length = Math.min(c.off.length, w); }
      } else creatures.set(item.n, makeCreature(item, firstLoad));
    }
    firstLoad = false;
  }

  /* ======================= creature drawing ======================= */
  function begin(c, x, y) { ctx.save(); ctx.globalAlpha = c.alpha; ctx.translate(x, y); ctx.scale(c.dir * c.turn, c.turnY); }
  function eyes(r) { ctx.globalCompositeOperation = 'source-over'; dot(r * .5, -r * .12, r * .11 + .6, PAL.eyeWhite); dot(r * .53, -r * .12, r * .055 + .3, PAL.eyeDark); }

  function drawFish(c, x, y, r) {

    }

    // Stable paint order by resting depth (band) so overlapping creatures never swap who's on top;
    // deeper band draws later = in front. frac is a fixed per-creature random, so the order is steady.
    const arr = [...creatures.values()].sort((a, b) => (a.frac - b.frac) || (a.name < b.name ? -1 : 1));
    // pass 2 — body avoidance (crabs push harder)
    for (let i = 0; i < arr.length; i++) for (let j = i + 1; j < arr.length; j++) {
      const a = arr[i], b = arr[j], ay = a.swimY + a.avoidY, by = b.swimY + b.avoidY;
      const dx = b.x - a.x, dy = by - ay, d = Math.hypot(dx, dy), min = (a.rDraw + b.rDraw) * CFG.avoid.gap;
      if (a.k.shape === 'crab' && b.k.shape === 'crab' && d < min * CFG.crab.near && d > .01) {
        const big = a.rDraw >= b.rDraw ? a : b, small = big === a ? b : a;   // larger crab scoots clear rather than shoving
        big.boost = CFG.crab.boost; if (big.dirLock <= 0) { big.dir = big.x >= small.x ? 1 : -1; big.dirLock = CFG.crab.dirLock; }   // commit, don't jitter
      }
      if (d < min && d > .01) {
        const p = (min - d) / min * CFG.avoid.push * dt;
        const ux = dx / d, uy = dy / d, sl = p * CFG.avoid.slide;   // + tangential slide so head-on pairs slip past instead of butting
        a.x += -ux * p - uy * sl; b.x += ux * p + uy * sl;          // (tangent = (-uy, ux); a & b take opposite ends)
        if (a.k.shape !== 'crab') a.avoidY += (-uy * p + ux * sl) * CFG.avoid.yBias;
        if (b.k.shape !== 'crab') b.avoidY += (uy * p - ux * sl) * CFG.avoid.yBias;
      }
    }
    // pass 2b — label repulsion (keep tags from overlapping; crab tags push harder)
    if (showLabels) for (let i = 0; i < arr.length; i++) for (let j = i + 1; j < arr.length; j++) {
      const a = arr[i], b = arr[j];
      const ax = a.x + a.labelOff.x, ay = a.swimY + a.avoidY - a.rDraw + a.labelOff.y;
      const bx = b.x + b.labelOff.x, by = b.swimY + b.avoidY - b.rDraw + b.labelOff.y;
      const ox = (a.labelHW + b.labelHW + 6) - Math.abs(bx - ax), oy = 15 - Math.abs(by - ay);
      if (ox > 0 && oy > 0) {
        const f = (a.k.shape === 'crab' || b.k.shape === 'crab') ? CFG.label.crabPush : CFG.label.push;
        if (ox < oy * 3) { const s = Math.sign(bx - ax || rand() - .5) * ox * .5 * f; a.labelOff.x -= s; b.labelOff.x += s; }
        else { const s = Math.sign(by - ay || 1) * oy * .5 * f; a.labelOff.y -= s; b.labelOff.y += s; }
      }
    }

    // pass 3 — draw + labels
    let hov = null, hd = 46;
    for (const c of arr) { const d = Math.hypot(c.x - mouse.x, (c.swimY + c.avoidY) - mouse.y); if (d < c.rDraw + 16 && d < hd) { hd = d; hov = c; } }
    for (const c of arr) {
      if (OFF.has('creatures')) break;
      const y = c.swimY + c.avoidY, r = c.rDraw, k = c.k.shape;
      if (k === 'jelly') drawJelly(c, c.x, y, r, clock);
      else if (k === 'whale') drawWhale(c, c.x, y, r);
      else if (k === 'squid') drawSquid(c, c.x, y, r);
      else if (k === 'ray') drawRay(c, c.x, y, r);
      else if (k === 'angler') drawAngler(c, c.x, y, r, clock);
      else if (k === 'crab') drawCrab(c, c.x, y, r);
      else if (k === 'school') { const fn = SPRITE_PHASES ? blitFish : drawFish; for (const o of c.off) fn(o.face === c.dir ? c : { ...c, dir: o.face }, c.x + o.dx, y + o.dy, r * CFG.radius.schoolFish); }
      else (SPRITE_PHASES ? blitFish : drawFish)(c, c.x, y, r);
      ctx.globalAlpha = 1;
      if (showLabels || hov === c) label(hov === c ? `${c.labelName} · ${c.mem} MiB` : c.labelName, c.x + c.labelOff.x, y - r - (k === 'whale' ? r * .5 : 8) + c.labelOff.y, hov === c);
    }
    ctx.globalAlpha = 1;
    if (!OFF.has('surface')) drawSurface(clock);
  }

  /* ======================= polling ======================= */
  const liveEl = document.getElementById('live'), connEl = document.getElementById('conn'), statsEl = document.getElementById('stats');
  const hostEl = document.getElementById('host');
  function applyState(d) {
    Object.assign(S, { cpu: d.cpu, load: d.load, load5: d.load5, cores: d.cores, memPct: d.memPct, swapPct: d.swapPct, temp: d.temp, disk: d.disk, alarms: d.alarms, alerts: d.alerts || [], containers: d.containers, uptime: d.uptime });
    const nowMs = Date.now(); tempHist.push([nowMs, d.temp]);                       // 15s mean smooths the stepped temp
    while (tempHist.length && nowMs - tempHist[0][0] > CFG.tempWindowMs) tempHist.shift();
    S.tempMean = tempHist.reduce((a, e) => a + e[1], 0) / tempHist.length;
    const w = CFG.weather, wx = clamp(S.load5 / Math.max(1, S.cores), 0, CFG.wxMax);
    const wi = clamp((wx - w.floor) / (CFG.wxMax - w.floor), 0, 1);                 // 0 = calm, 1 = full storm
    env.wi = wi;
    env.cloudCount = Math.round(w.cloudBase + wi * w.cloudGain);
    env.cloudSize = w.sizeBase + wi * w.sizeGain;
    env.wind = w.windBase + wi * w.windGain;
    env.waveAmp = w.waveBase + wi * w.waveGain;
    env.rockCount = CFG.disk.base + Math.round(Math.pow(clamp((S.disk - CFG.disk.knee) / (100 - CFG.disk.knee), 0, 1), CFG.disk.exp) * (CFG.disk.max - CFG.disk.base));
    env.stormAT = S.alarms > 0 ? 1 : 0;
    reconcile(d.roster || []);
    if (d.host && hostEl.textContent !== d.host) hostEl.textContent = d.host;
    statsEl.innerHTML = `up <b>${d.uptime}</b><br>load5 <b>${d.load5}</b>/${d.cores} · cpu <b>${d.cpu}%</b> · <b>${d.temp}°</b><br>mem <b>${d.memPct}%</b> · swap <b>${d.swapPct}%</b> · disk <b>${d.disk}%</b><br><b>${d.containers}</b> containers · <b>${d.alarms}</b> alert${d.alarms === 1 ? '' : 's'}`;
    lastUpdate = Date.now(); connState = 'live';
  }
  async function poll() {
    try { const r = await fetch('/state.json', { cache: 'no-store' }); if (!r.ok) throw 0; applyState(await r.json()); }
    catch (e) { connState = (Date.now() - lastUpdate > 15000 || !lastUpdate) ? 'down' : 'stale'; }
  }
  setInterval(() => {
    const age = lastUpdate ? Math.round((Date.now() - lastUpdate) / 1000) : null;
    if (connState === 'live') { liveEl.className = 'live'; connEl.textContent = 'live · updated ' + (age <= 1 ? 'just now' : age + 's ago'); }
    else if (connState === 'stale') { liveEl.className = 'live stale'; connEl.textContent = `reconnecting… (${age}s)`; }
    else if (connState === 'down') { liveEl.className = 'live down'; connEl.textContent = 'no connection'; }
  }, 1000);

  /* ======================= boot ======================= */
  function resize() {
    DPR = DPR_CAP > 0 ? Math.min(DPR_CAP, devicePixelRatio || 1) : (devicePixelRatio || 1); W = innerWidth; H = innerHeight;   // dpr 0 = native
    cv.width = W * DPR; cv.height = H * DPR; cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    waterY = H * CFG.waterLevelF; bedY = H * CFG.bedFrac;
    _sprites.clear(); _spriteBytes = 0;   // sprites are baked at DPR; rebuild on size change
  }
  addEventListener('resize', resize);
  addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  addEventListener('mouseleave', () => { mouse.x = mouse.y = -999; });
  document.getElementById('lbl').addEventListener('click', e => { showLabels = !showLabels; e.currentTarget.textContent = 'labels: ' + (showLabels ? 'on' : 'off'); });
  // Browsers throttle rAF while the page is hidden; reset the clock on return so dt doesn't lurch.
  document.addEventListener('visibilitychange', () => { if (!document.hidden) last = performance.now(); });
  // ?debug=1 → small readout so we can confirm the actual fps / DPR the wallpaper is running at.
  if (DEBUG) {
    const dbg = document.createElement('div');
    dbg.style.cssText = 'position:fixed;right:12px;bottom:44px;z-index:9;font:700 13px ui-monospace,Menlo,monospace;color:#7df9ff;background:rgba(0,0,0,.6);padding:6px 10px;border-radius:8px;pointer-events:none';
    document.body.appendChild(dbg);
    let t0 = performance.now();
    setInterval(() => {
      const now = performance.now(), fps = Math.round(fpsN * 1000 / (now - t0));
      fpsN = 0; t0 = now;
      dbg.textContent = `${FPS_CAP ? 'wallpaper' : 'browser'} · ${fps}fps · dpr${DPR} · ${W}×${H}` + (SPRITE_PHASES ? ` · ${_sprites.size} sprites ${(_spriteBytes / 1e6).toFixed(1)}MB` : '');
    }, 1000);
  }

  (async () => {
    await loadConfig();                                  // fetch creature rules + render settings before first paint
    resize();
    if (BENCH) applyState(BENCH_STATE);                  // fixed workload: seed once, never poll
    else { poll(); setInterval(poll, CFG.pollMs); }
    requestAnimationFrame(frame);
  })();
})();
</script>
</body>
</html>
